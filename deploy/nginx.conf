# /etc/nginx/sites-available/naturall-academy
# Reverse proxy: HTTPS público → Next.js em 127.0.0.1:3001
# Certbot vai injetar as linhas de SSL automaticamente.

server {
    listen 80;
    listen [::]:80;
    server_name naturallacademy.com www.naturallacademy.com;

    # Webhook Kiwify — body grande pode chegar
    client_max_body_size 1m;

    # Redirect www → root (preserva o https quando o cert estiver instalado)
    if ($host = www.naturallacademy.com) {
        return 301 $scheme://naturallacademy.com$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache para assets estáticos do Next
    location /_next/static {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service worker / manifest sem cache
    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "no-cache";
    }
}
